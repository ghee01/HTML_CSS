<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        a {
            text-decoration: 0;
            color: #222;
        }
        #travel {
            width: 1200px;
            margin: 0 auto;
        }
        .title-text {
            text-align: center;
        }
        .title-text > h2 {
            font-size: 2.5rem;
            color: #919191;
        }
        .title-text > p {
            font-size: 1.2rem;
            color: #ccc;
        }
        .travel-list {
            padding-top: 20px;
        }
        .travel-card {
            width: 250px;
            height: 340px;
            float: left;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding: 10px;
            margin-right: 20px;
            text-align: center;
        }
        .travel-card img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-top: 20px;
            margin-bottom: 10px;
            border: 0.3px solid #eee;
        }
        .travel-card p {
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div id="travel">
        <div class="title-text">
            <h2>여가 시간 즐기기</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
        </div>

        <div class="travel-list">
            <div class="travel-card">
                <a href="#">
                    <img src="image/shinichi.jpg" alt="신이치">
                    <h3>쿠도 신이치</h3>
                    <p>Kudo Shinichi</p>
                </a>
            </div>

            <div class="travel-card">
                <a href="#">
                    <img src="image/heiji.jpg" alt="헤이지">
                    <h3>핫토리 헤이지</h3>
                    <p>Hattori Heiji</p>
                </a>
            </div>            

            <div class="travel-card">
                <a href="#">
                    <img src="image/kid.jpg" alt="키드">
                    <h3>괴도 키드</h3>
                    <p>Kaito Kid</p>
                </a>
            </div>

            <div class="travel-card">
                <a href="#">
                    <img src="image/jinpei.jpg" alt="진페이">
                    <h3>마츠다 진페이</h3>
                    <p>Matsuda Jinpei</p>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
