<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            background-color: #222;
        }
        .container {
            width: 700px;
            height: 600px;
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }
        .box {
            background-color: #eeec5d;
            text-align: center;
            padding: 20px;
        }
        .box1 {
            grid-column: 1 / 3;
            grid-row: 1 / 3;
        }
        .box2 {
            grid-column: 3 / 5;
            grid-row-start: 1;
        }
        .box3 {
            grid-column-start: 3;
            grid-row: 2 / 4;
        }
        .box4 {
            grid-column-start: 4;
            grid-row: 2 / 4;
        }
        .box5 {
            grid-column: 1 / 3;
            grid-row-start: 3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
        <div class="box box4">4</div>
        <div class="box box5">5</div>
    </div>
</body>
</html>
