<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레드향 주문하기</title>
</head>
<body>
    <h1>레드향 주문하기</h1>

    <form action="register.php">
        <fieldset>
            <legend>배송 정보</legend>

            <!-- 배송 정보 입력하는 폼 만들기 : 목록, label, input -->
            <ul>
                <li>
                    <label for="user-name">이름
                        <input type="text" id="user-name">
                    </label>
                </li>

                <li>
                    <label for="addr">배송주소
                        <input type="text" id="addr">
                    </label>
                </li>
                
                <li>
                    <label for="mail">이메일
                        <input type="email" id="mail">
                    </label>
                </li>

                <li>
                    <label for="phone">연락처
                        <input type="tel" id="phone">
                    </label>
                </li>
            </ul>
        </fieldset>

        <!-- 라디오 버튼과 체크 박스 사용한 폼 -->
        <fieldset>
            <legend>상품 선택</legend>

            <p><b>주문할 상품을 선택해 주세요.</b></p>

            <ul>
                <li>
                    <label>
                        <input type="checkbox" name="prod" value="s_3">선물용 3kg
                    </label>
                    <input type="number" min="0" max="5">개 (최대 5개)
                </li>
                <li>
                    <label>
                        <input type="checkbox" name="prod" value="s_5">선물용 5kg
                    </label>
                    <input type="number" min="0" max="3" value="1">개 (최대 3개)
                </li>
                <li>
                    <label>
                        <input type="checkbox" name="prod" value="f_3">가정용 3kg
                    </label>
                    <input type="number" min="0" max="5">개 (최대 5개)
                </li>
                <li>
                    <label>
                        <input type="checkbox" name="prod" value="f_5">가정용 5kg
                    </label>
                    <input type="number" min="0" max="3" value="1">개 (최대 3개)
                </li>

                <!-- 슬라이드 막대 -->
                <input type="range" min="0" max="100" step="1" value="20">
            </ul>

            <p><b>포장 선택</b></p>

            <ul>
                <li>
                    <label><input type="radio" name="gift" value="yes">선물 포장
                    </label>
                </li>

                <li>
                    <label><input type="radio" name="gift" value="no">선물 포장 안 함
                    </label>
                </li>
            </ul>
        </fieldset>

        <fieldset>
            <legend>날짜</legend>

            <input type="date">
            <input type="month">
            <input type="week">
            <input type="date" min="2026-05-18" max="2026-05-24">
        </fieldset>

        <fieldset>
            <legend>시간</legend>

            <input type="time">
            <input type="datetime-local">
        </fieldset>

        <fieldset>
            <legend>첨부파일</legend>

            <input type="file">
        </fieldset>
    </form>
</body>
</html>
