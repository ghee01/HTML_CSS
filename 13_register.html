<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원 가입</title>
</head>
<body>
    <h1>회원 가입을 환영합니다</h1>

    <form action="register.php">
        <fieldset>
            <legend>사용자 정보</legend>

            <ul>
                <li>
                    <label for="uid">아이디
                        <input type="text" id="uid">
                    </label>
                </li>
                <li>
                    <label for="umail">이메일
                        <input type="email" id="umail">
                    </label>
                </li>
                <li>
                    <label for="pw1">비밀번호
                        <input type="password" id="pw1">
                    </label>
                </li>
                <li>
                    <label for="pw2">비밀번호 확인
                        <input type="password" id="pw2">
                    </label>
                </li>
            </ul>
        </fieldset>

        <fieldset>
            <legend>이벤트와 새로운 소식</legend>

            <input type="radio" name="mailing" value="mailing_yes" id="mailing_y">
            <label for="mailing_y">메일 수신</label>
            <input type="radio" name="mailing" value="mailing_no" id="mailing_n">
            <label for="mailing_n">메일 수신 안 함</label>
        </fieldset>

        <div>
            <input type="submit" value="가입하기">
            <input type="reset" value="취소">
        </div>
        </form>
</body>
</html>
