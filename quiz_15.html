<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container {
            width: 450px;
            height: 50px;
            border: 1px solid #333;
            padding: 8px;
        }
        .box {
            width: 50px;
            height: 50px;
            animation: changeColor 3s infinite, translate 3s infinite alternate;
        }

        @keyframes changeColor {
            0% {
                background-color: #ffe867;
            }
            50% {
                background-color: #ff5e62;
            }
            100% {
                background-color: #17bdff;
            }
        }
        @keyframes translate {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(400px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>
</html>
